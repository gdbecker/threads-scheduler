name: Threads Scheduler

on:
  schedule:
    - cron: "11,41 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post-due-threads:
    runs-on: ubuntu-latest

    env:
      THREADS_GARRETTS_DEV_DESK_USER_ID: ${{ secrets.THREADS_GARRETTS_DEV_DESK_USER_ID }}
      THREADS_GARRETTS_DEV_DESK_ACCESS_TOKEN: ${{ secrets.THREADS_GARRETTS_DEV_DESK_ACCESS_TOKEN }}
      THREADS_EDGE_STUDIO_USER_ID: ${{ secrets.THREADS_EDGE_STUDIO_USER_ID }}
      THREADS_EDGE_STUDIO_ACCESS_TOKEN: ${{ secrets.THREADS_EDGE_STUDIO_ACCESS_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Post due Threads posts
        run: npm run post:due

      - name: Commit post status updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Threads post statuses"
          file_pattern: posts/**/*.json
